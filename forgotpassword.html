<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Password help</title>
  <style>
    :root{
      --text:#0a0a0a;
      --field-bg:#eef2f4;
      --field-label:#6b6f73;
      --btn:#0b57b7;
      --link:#0070e0;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:#fff;
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    /* Mobile-first (standard phone viewport) */
    .page{
      min-height:100vh;
      padding: 28px 20px 40px;
      max-width: 430px;
      margin: 0 auto;
    }

    .logo{
      width: 54px;
      height: auto;
      display:block;
    }

    .hero{
      margin-top: 56px;
    }

    h1{
      margin:0;
      font-weight: 900;
      letter-spacing: -0.02em;
      font-size: clamp(34px, 6.5vw, 42px);
      line-height: 1.03;
    }

    .sub{
      margin-top: 18px;
      font-size: clamp(15px, 3.8vw, 18px);
      line-height: 1.35;
      font-weight: 500;
    }

    .field{
      margin-top: 22px;
      width:100%;
      background: var(--field-bg);
      border-radius: 12px;
      padding: 14px 14px 12px;
    }

    .field label{
      display:block;
      font-size: 13px;
      color: var(--field-label);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .field input{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      padding: 6px 0 2px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .cta{
      margin-top: 22px;
      width:100%;
      height: 54px;
      border:0;
      border-radius: 999px;
      background: var(--btn);
      color:#fff;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.01em;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .cta:active{ transform: translateY(1px); }

    .forgot{
      margin-top: 22px;
      text-align:center;
    }

    .forgot a{
      color: var(--link);
      font-size: 16px;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    /* Larger screens: keep it looking like a centered mobile screen */
    @media (min-width: 768px){
      .page{ padding-top: 36px; }
      .hero{ margin-top: 64px; }
    }
  </style>
</head>

<body>
  <main class="page">
    <!-- PayPal logo loaded from local file path -->
    <img class="logo" src="paypal-logo.png" alt="PayPal" />

    <section class="hero">
      <h1>Need help with your<br/>password?</h1>
      <div class="sub">Enter your email or username to get started.</div>

      <form id="helpForm" novalidate>
        <div class="field">
          <label for="email">Email or username</label>
          <input id="email" name="email" type="email" inputmode="email" autocomplete="username" value="" />
        </div>

        <button class="cta" type="submit">Next</button>
      </form>

      <div class="forgot">
        <a href="#">Forgot your email?</a>
      </div>
    </section>
  </main>

  <script>
    (function(){
      const form = document.getElementById('helpForm');
      const emailInput = document.getElementById('email');

      // Simple, practical email check (good UX, not overly strict)
      const isValidEmail = (value) => {
        const v = (value || '').trim();
        if (!v) return false;
        // basic: something@something.something, no spaces
        return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v);
      };

      form.addEventListener('submit', function(e){
        e.preventDefault();

        const value = emailInput.value;
        if (!isValidEmail(value)){
          alert('Please enter a valid email address.');
          emailInput.focus();
          return;
        }

        // Redirect to verification page
        window.location.href = 'verification.html';
      });
    })();
  </script>
</body>
</html>
